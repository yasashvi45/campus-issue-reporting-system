<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Campus Issue Reporting System</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <!-- Sidebar will be injected by UI.renderSidebar() -->
        </aside>

        <main class="main-content">
            <nav class="top-navbar">
                <div class="navbar-left">
                    <button class="mobile-menu-btn" onclick="UI.toggleSidebar()">
                        <i class="ri-menu-line"></i>
                    </button>
                    <div class="search-bar" style="position: relative;">
                        <i class="ri-search-line" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.5;"></i>
                        <input type="text" placeholder="Search..." style="padding-left: 36px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); height: 36px; width: 240px; outline: none;">
                    </div>
                </div>
                <div class="navbar-center" style="font-weight: 600; font-size: 15px; letter-spacing: 0.5px;">Campus Issue Reporting System</div>
                <div class="navbar-right">
                    <div class="notification-wrapper">
                        <button class="notification-btn" onclick="UI.toggleNotifications(event)" title="Notifications">
                            <i class="ri-notification-3-line"></i>
                            <span id="notif-badge" class="notification-badge" style="display: none;">0</span>
                        </button>
                        <div id="notif-dropdown" class="dropdown-menu" style="display: none;">
                            <div id="notif-list" class="dropdown-list">
                                <!-- Notifications -->
                            </div>
                        </div>
                    </div>
                    <button class="toggle-btn" onclick="Theme.toggle()" title="Toggle Theme">
                        <i class="ri-moon-line theme-icon"></i>
                    </button>
                    <div class="profile-dropdown" onclick="UI.toggleProfileMenu(event)">
                        <div class="avatar" id="userAvatar">US</div>
                        <div id="profileMenu" class="dropdown-menu" style="display: none;">
                            <!-- Content injected by UI.updateUserInfo() -->
                        </div>
                    </div>
                </div>
            </nav>

            <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h1 style="margin: 0; font-size: 24px; font-weight: 600; letter-spacing: -0.5px;">All Notifications</h1>
                <div style="display: flex; gap: 12px;">
                    <button class="btn btn-outline" onclick="Notifications.markAllRead()" style="padding: 10px 20px; border-radius: 12px; font-weight: 500;">Mark all as read</button>
                    <button class="btn btn-outline" onclick="Notifications.clearAll()" style="padding: 10px 20px; border-radius: 12px; font-weight: 500; color: var(--danger);">Clear all</button>
                </div>
            </div>

            <div id="notificationsContainer" style="display: flex; flex-direction: column; gap: 12px;">
                <!-- Notifications will be loaded here -->
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/issues.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Auth.checkAuth('student');
            loadAllNotifications();
        });

        function loadAllNotifications() {
            const session = Auth.getSession();
            const userId = session.userId;
            const notifs = Notifications.getForUser(userId);
            const container = document.getElementById('notificationsContainer');
            
            if (notifs.length === 0) {
                container.innerHTML = UI.getEmptyState("No notifications yet", "You'll be notified of important updates here", "ri-notification-off-line");
                return;
            }

            container.innerHTML = notifs.reverse().map(n => {
                const date = new Date(n.date);
                const dateStr = !isNaN(date.getTime()) ? date.toLocaleString() : 'Just now';
                const url = n.relatedIssueId ? `./issue-details.html?id=${n.relatedIssueId}` : '#';
                
                return `
                    <div onclick="Notifications.markAsRead(${n.id}); window.location.href='${url}'" style="background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); border-left: 4px solid ${n.read ? 'transparent' : 'var(--primary)'}; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: var(--transition); ${n.read ? 'opacity: 0.7;' : ''}" onmouseover="this.style.transform='translateX(4px)'; this.style.background='rgba(79, 70, 229, 0.02)'" onmouseout="this.style.transform='translateX(0)'; this.style.background='var(--card)'">
                        <div style="display: flex; gap: 16px; align-items: center;">
                            <div style="width: 40px; height: 40px; border-radius: 12px; background: ${n.type === 'success' ? 'rgba(16, 185, 129, 0.1)' : n.type === 'warning' ? 'rgba(245, 158, 11, 0.1)' : 'rgba(79, 70, 229, 0.1)'}; color: ${n.type === 'success' ? 'var(--success)' : n.type === 'warning' ? 'var(--warning)' : 'var(--primary)'}; display: flex; align-items: center; justify-content: center; font-size: 20px;">
                                <i class="${n.type === 'success' ? 'ri-checkbox-circle-line' : n.type === 'warning' ? 'ri-error-warning-line' : 'ri-information-line'}"></i>
                            </div>
                            <div>
                                <div style="font-weight: 600; font-size: 15px; color: var(--text); margin-bottom: 4px;">${n.message}</div>
                                <div style="font-size: 12px; opacity: 0.5;">${dateStr}</div>
                            </div>
                        </div>
                        <i class="ri-arrow-right-s-line" style="opacity: 0.3; font-size: 20px;"></i>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
