<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Issues - Campus Issue Reporting System</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <!-- Sidebar will be injected by UI.renderSidebar() -->
        </aside>

        <main class="main-content">
            <nav class="top-navbar">
                <div class="navbar-left">
                    <button class="mobile-menu-btn" onclick="UI.toggleSidebar()">
                        <i class="ri-menu-line"></i>
                    </button>
                    <div class="search-bar" style="position: relative;">
                        <i class="ri-search-line" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.5;"></i>
                        <input type="text" placeholder="Search..." style="padding-left: 36px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); height: 36px; width: 240px; outline: none;">
                    </div>
                </div>
                <div class="navbar-center" style="font-weight: 600; font-size: 15px; letter-spacing: 0.5px;">Campus Issue Reporting System</div>
                <div class="navbar-right">
                    <div class="notification-wrapper">
                        <button class="notification-btn" onclick="UI.toggleNotifications(event)" title="Notifications">
                            <i class="ri-notification-3-line"></i>
                            <span id="notif-badge" class="notification-badge" style="display: none;">0</span>
                        </button>
                        <div id="notif-dropdown" class="dropdown-menu" style="display: none;">
                            <div id="notif-list" class="dropdown-list">
                                <!-- Notifications -->
                            </div>
                        </div>
                    </div>
                    <button class="toggle-btn" onclick="Theme.toggle()" title="Toggle Theme">
                        <i class="ri-moon-line theme-icon"></i>
                    </button>
                    <div class="profile-dropdown" onclick="UI.toggleProfileMenu(event)">
                        <div class="avatar" id="userAvatar">JD</div>
                        <div id="profileMenu" class="dropdown-menu" style="display: none;">
                            <a href="./profile.html" class="nav-link"><i class="ri-user-settings-line"></i> Profile Settings</a>
                            <a href="./support.html" class="nav-link"><i class="ri-customer-service-2-line"></i> Support</a>
                            <div class="dropdown-divider" style="height: 1px; background: var(--border); margin: 8px 0;"></div>
                            <a href="#" onclick="Auth.logout()" class="nav-link danger" style="color: var(--danger);"><i class="ri-logout-box-line"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </nav>
            <div class="card-header" style="margin-top: -8px;">
                <h1 style="font-weight: 600;">My Reported Issues</h1>
                <button class="btn btn-primary" onclick="window.location.href='./report.html'">
                    <i class="ri-add-line"></i> New Issue
                </button>
            </div>

            <div style="background: var(--card); padding: 16px; border-radius: 12px; margin-bottom: 24px; display: flex; gap: 16px; align-items: center; border: 1px solid var(--border); box-shadow: var(--shadow-l1);">
                <div class="search-bar" style="flex: 1; position: relative; margin: 0; width: auto;">
                    <i class="ri-search-line" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); opacity: 0.5;"></i>
                    <input type="text" id="searchInput" placeholder="Search by title..." oninput="filterIssues()" style="width: 100%; padding: 10px 16px 10px 44px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); font-size: 14px; outline: none; transition: all 0.2s ease;">
                </div>
                <select id="categoryFilter" class="btn btn-outline" onchange="filterIssues()" style="padding: 10px 16px; border-radius: 12px; background: var(--bg); border: 1px solid var(--border); font-size: 14px; outline: none; cursor: pointer;">
                    <option value="">All Categories</option>
                    <option value="Electrical">Electrical</option>
                    <option value="Water">Water</option>
                    <option value="Internet">Internet</option>
                    <option value="AC">AC</option>
                    <option value="Cleaning">Cleaning</option>
                </select>
                <select id="statusFilter" class="btn btn-outline" onchange="filterIssues()" style="padding: 10px 16px; border-radius: 12px; background: var(--bg); border: 1px solid var(--border); font-size: 14px; outline: none; cursor: pointer;">
                    <option value="">All Status</option>
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Resolved">Resolved</option>
                </select>
                <select id="sortBy" class="btn btn-outline" onchange="filterIssues()" style="padding: 10px 16px; border-radius: 12px; background: var(--bg); border: 1px solid var(--border); font-size: 14px; outline: none; cursor: pointer;">
                    <option value="newest">Newest First</option>
                    <option value="priority">Highest Priority</option>
                </select>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Location</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="myIssuesTable">
                        <!-- Dynamic content -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/ai-agent.js"></script>
    <script src="../js/issues.js"></script>
    <script src="../js/bookmarks.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/student.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Auth.checkAuth('student');
            Student.loadMyIssues();
            
            const urlParams = new URLSearchParams(window.location.search);
            const issueId = urlParams.get('id');
            const chat = urlParams.get('chat') === 'true';
            if (issueId) {
                UI.showIssueDetails(issueId, chat);
            }
        });

        function filterIssues() {
            const search = document.getElementById('searchInput').value;
            const category = document.getElementById('categoryFilter').value;
            const status = document.getElementById('statusFilter').value;
            const sortBy = document.getElementById('sortBy').value;
            Student.loadMyIssues({ search, category, status, sortBy });
        }
    </script>
</body>
</html>
