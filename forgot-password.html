<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Campus Issue Reporting System</title>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/forms.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="auth-container" style="background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">
        <div class="auth-card" style="background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 40px; border-radius: 16px; box-shadow: var(--shadow-l3); width: 100%; max-width: 450px;">
            <div class="auth-header" style="text-align: center; margin-bottom: 32px;">
                <h1 style="color: var(--text); margin-bottom: 8px; font-size: 24px;">Reset Password</h1>
                <p id="stepDescription" style="color: var(--text); opacity: 0.7;">Enter your registered email to continue</p>
            </div>

            <!-- Step 1: Email Verification -->
            <form id="emailForm">
                <div class="form-group" style="margin-bottom: 24px;">
                    <label style="color: var(--text); display: block; margin-bottom: 8px; font-weight: 500;">Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com" style="background: var(--bg); color: var(--text); border: 1px solid var(--border); width: 100%; padding: 12px 16px; border-radius: 8px; outline: none;">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; border-radius: 8px; font-weight: 600;">Verify Email</button>
            </form>

            <!-- Step 2: New Password -->
            <form id="resetForm" style="display: none;">
                <div class="form-group" style="margin-bottom: 16px;">
                    <label style="color: var(--text); display: block; margin-bottom: 8px; font-weight: 500;">New Password</label>
                    <input type="password" id="newPassword" required placeholder="••••••••" style="background: var(--bg); color: var(--text); border: 1px solid var(--border); width: 100%; padding: 12px 16px; border-radius: 8px; outline: none;">
                </div>
                <div class="form-group" style="margin-bottom: 24px;">
                    <label style="color: var(--text); display: block; margin-bottom: 8px; font-weight: 500;">Confirm New Password</label>
                    <input type="password" id="confirmPassword" required placeholder="••••••••" style="background: var(--bg); color: var(--text); border: 1px solid var(--border); width: 100%; padding: 12px 16px; border-radius: 8px; outline: none;">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; border-radius: 8px; font-weight: 600;">Update Password</button>
            </form>

            <!-- Step 3: Success -->
            <div id="successMessage" style="display: none; text-align: center;">
                <div style="width: 64px; height: 64px; background: rgba(16, 185, 129, 0.1); color: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 32px;">
                    <i class="ri-checkbox-circle-line"></i>
                </div>
                <h3 style="margin-bottom: 12px;">Password Updated!</h3>
                <p style="opacity: 0.7; margin-bottom: 24px;">Your password has been updated successfully. You can now login with your new password.</p>
                <a href="./login.html" class="btn btn-primary" style="display: block; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: 600;">Back to Login</a>
            </div>

            <div class="auth-footer" style="text-align: center; margin-top: 32px;">
                <a href="./login.html" id="backLink" style="color: var(--text); opacity: 0.5; font-size: 14px; text-decoration: none;">Back to Login</a>
            </div>
        </div>
    </div>

    <script src="./js/auth.js"></script>
    <script src="./js/notifications.js"></script>
    <script src="./js/theme.js"></script>
    <script>
        let verifiedEmail = '';

        document.getElementById('emailForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            
            const user = Auth.findUserByEmail(email);
            if (user) {
                verifiedEmail = email;
                document.getElementById('emailForm').style.display = 'none';
                document.getElementById('resetForm').style.display = 'block';
                document.getElementById('stepDescription').innerText = 'Create a strong new password';
                document.getElementById('backLink').style.display = 'none';
            } else {
                Notifications.showToast('User not found', 'danger');
            }
        });

        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword.length < 6) {
                Notifications.showToast('Password must be at least 6 characters', 'danger');
                return;
            }

            if (newPassword !== confirmPassword) {
                Notifications.showToast('Passwords do not match', 'danger');
                return;
            }

            try {
                Auth.resetPassword(verifiedEmail, newPassword);
                document.getElementById('resetForm').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('stepDescription').style.display = 'none';
            } catch (error) {
                Notifications.showToast(error.message, 'danger');
            }
        });
    </script>
</body>
</html>
