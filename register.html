<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Campus Issue Reporting System</title>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/forms.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container" style="background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">
        <div class="auth-card" style="background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 40px; border-radius: 16px; box-shadow: var(--shadow-l3); width: 100%; max-width: 450px;">
            <div class="auth-header" style="text-align: center; margin-bottom: 32px;">
                <h1 class="auth-title" style="color: var(--text); margin-bottom: 8px; font-size: 24px;">Campus Issue Reporting System</h1>
                <h2 style="color: var(--text); margin-bottom: 8px; font-size: 18px; font-weight: 500;">Create Account</h2>
                <p style="color: var(--text); opacity: 0.7;">Join the smart campus community</p>
            </div>
            <form id="registerForm">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="color: var(--text); display: block; margin-bottom: 8px; font-weight: 500;">Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe" style="background: var(--bg); color: var(--text); border: 1px solid var(--border); width: 100%; padding: 12px 16px; border-radius: 8px; outline: none;">
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="color: var(--text); display: block; margin-bottom: 8px; font-weight: 500;">Student ID</label>
                    <input type="text" id="studentId" required placeholder="STU12345" style="background: var(--bg); color: var(--text); border: 1px solid var(--border); width: 100%; padding: 12px 16px; border-radius: 8px; outline: none;">
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="color: var(--text); display: block; margin-bottom: 8px; font-weight: 500;">Email Address</label>
                    <input type="email" id="email" required placeholder="john@campus.edu" style="background: var(--bg); color: var(--text); border: 1px solid var(--border); width: 100%; padding: 12px 16px; border-radius: 8px; outline: none;">
                </div>
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="color: var(--text); display: block; margin-bottom: 8px; font-weight: 500;">Department</label>
                    <select id="department" required style="background: var(--bg); color: var(--text); border: 1px solid var(--border); width: 100%; padding: 12px 16px; border-radius: 8px; outline: none; cursor: pointer;">
                        <option value="">Select Branch</option>
                        <option value="CSE">CSE (Computer Science Engineering)</option>
                        <option value="ECE">ECE (Electronics and Communication Engineering)</option>
                        <option value="EEE">EEE (Electrical and Electronics Engineering)</option>
                        <option value="MECH">MECH (Mechanical Engineering)</option>
                        <option value="CIVIL">CIVIL (Civil Engineering)</option>
                        <option value="IT">IT (Information Technology)</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 24px;">
                    <label style="color: var(--text); display: block; margin-bottom: 8px; font-weight: 500;">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="password" required placeholder="••••••••" style="background: var(--bg); color: var(--text); border: 1px solid var(--border); width: 100%; padding: 12px 16px; border-radius: 8px; outline: none; padding-right: 60px;">
                        <button type="button" id="togglePassword" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--primary); cursor: pointer; font-size: 13px; font-weight: 600;">
                            Show
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; border-radius: 8px; font-weight: 600;">Register Account</button>
            </form>
            <div class="auth-footer" style="text-align: center; margin-top: 32px;">
                <p style="color: var(--text); opacity: 0.7;">Already have an account? <a href="./login.html" style="color: var(--primary); font-weight: 600;">Login here</a></p>
                <p style="margin-top: 12px;"><a href="./admin/admin-register.html" style="color: var(--text); opacity: 0.5; font-size: 14px;">Admin Portal</a></p>
            </div>
        </div>
    </div>

    <script src="./js/auth.js"></script>
    <script src="./js/notifications.js"></script>
    <script src="./js/theme.js"></script>
    <script src="./js/ui.js"></script>
    <script>
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                this.textContent = 'Hide';
            } else {
                passwordInput.type = 'password';
                this.textContent = 'Show';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const userData = {
                name: document.getElementById('name').value,
                studentId: document.getElementById('studentId').value,
                email: document.getElementById('email').value,
                department: document.getElementById('department').value,
                password: document.getElementById('password').value
            };

            try {
                Auth.register(userData);
                Notifications.showToast('Registration successful! Please login.', 'success');
                setTimeout(() => {
                    window.location.href = './login.html';
                }, 1500);
            } catch (error) {
                Notifications.showToast(error.message, 'danger');
            }
        });
    </script>
</body>
</html>
