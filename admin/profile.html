<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile - Campus Issue Reporting System</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/forms.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <i class="ri-government-line"></i>
                    <span>ABC Campus</span>
                </div>
                <button class="icon-btn" onclick="UI.toggleSidebar()" style="font-size: 18px;">
                    <i class="ri-menu-fold-line"></i>
                </button>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="./admin-dashboard.html" class="nav-link ">
                        <i class="ri-dashboard-line"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="./manage-issues.html" class="nav-link ">
                        <i class="ri-list-settings-line"></i>
                        <span>Manage Issues</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="./students.html" class="nav-link ">
                        <i class="ri-group-line"></i>
                        <span>User Management</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="./analytics.html" class="nav-link ">
                        <i class="ri-bar-chart-box-line"></i>
                        <span>Analytics</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="./reports.html" class="nav-link ">
                        <i class="ri-file-chart-line"></i>
                        <span>Reports</span>
                    </a>
                </li>
            </ul>
        </aside>

        <main class="main-content">
            <nav class="top-navbar">
                <div class="navbar-left">
                    <button class="mobile-menu-btn" onclick="UI.toggleSidebar()">
                        <i class="ri-menu-line"></i>
                    </button>
                    <div class="search-bar" style="position: relative;">
                        <i class="ri-search-line" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.5;"></i>
                        <input type="text" placeholder="Search..." style="padding-left: 36px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); height: 36px; width: 240px; outline: none;">
                    </div>
                </div>
                <div class="navbar-center" style="font-weight: 600; font-size: 15px; letter-spacing: 0.5px;">Campus Issue Reporting System</div>
                <div class="navbar-right">
                    <div class="notification-wrapper">
                        <button class="notification-btn" onclick="UI.toggleNotifications(event)" title="Notifications">
                            <i class="ri-notification-3-line"></i>
                            <span id="notif-badge" class="notification-badge" style="display: none;">0</span>
                        </button>
                        <div id="notif-dropdown" class="dropdown-menu" style="display: none;">
                            <div id="notif-list" class="dropdown-list">
                                <!-- Notifications -->
                            </div>
                        </div>
                    </div>
                    <button class="toggle-btn" onclick="Theme.toggle()" title="Toggle Theme">
                        <i class="ri-moon-line theme-icon"></i>
                    </button>
                    <div class="profile-dropdown" onclick="UI.toggleProfileMenu(event)">
                        <div class="avatar" id="adminAvatar">AD</div>
                        <div id="profileMenu" class="dropdown-menu" style="display: none;">
                            <a href="./profile.html" class="nav-link"><i class="ri-user-settings-line"></i> Profile Settings</a>
                            <a href="../student/support.html" class="nav-link"><i class="ri-customer-service-2-line"></i> Support</a>
                            <div class="dropdown-divider" style="height: 1px; background: var(--border); margin: 8px 0;"></div>
                            <a href="#" onclick="Auth.logout()" class="nav-link danger" style="color: var(--danger);"><i class="ri-logout-box-line"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </nav>
            <div class="card-header">
                <h1>Admin Profile</h1>
            </div>

            <div style="background: var(--card); padding: 32px; border-radius: 12px; max-width: 800px; border: 1px solid var(--border); box-shadow: var(--shadow-l1);">
                <div style="display: flex; gap: 24px; border-bottom: 1px solid var(--border); margin-bottom: 32px;">
                    <button class="btn" style="border-radius: 0; border-bottom: 2px solid var(--primary); padding: 12px 0;">Personal Information</button>
                </div>

                <div style="display: flex; align-items: center; gap: 24px; margin-bottom: 40px;">
                    <div style="position: relative; cursor: pointer;" onclick="document.getElementById('avatarUpload').click()">
                        <div class="avatar" style="width: 80px; height: 80px; font-size: 32px; overflow: hidden;" id="profileAvatar">AD</div>
                        <div style="position: absolute; bottom: 0; right: 0; background: var(--primary); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; border: 2px solid var(--bg);">
                            <i class="ri-pencil-line"></i>
                        </div>
                    </div>
                    <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
                    <div>
                        <h2 id="profileName" style="margin: 0 0 4px 0;">Admin</h2>
                        <p id="profileEmail" style="margin: 0; opacity: 0.7;"></p>
                    </div>
                </div>

                <form id="profileForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label style="display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; opacity: 0.7;">Full Name</label>
                            <input type="text" id="name" class="form-control" required style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 14px; transition: all 0.2s ease; outline: none;">
                        </div>
                        <div class="form-group">
                            <label style="display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; opacity: 0.7;">Email Address</label>
                            <input type="email" id="email" class="form-control" required style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 14px; transition: all 0.2s ease; outline: none;">
                        </div>
                        <div class="form-group">
                            <label style="display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; opacity: 0.7;">College Name</label>
                            <input type="text" id="collegeName" class="form-control" required style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 14px; transition: all 0.2s ease; outline: none;">
                        </div>
                        <div class="form-group">
                            <label style="display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; opacity: 0.7;">Admin ID (Read-only)</label>
                            <input type="text" id="adminId" class="form-control" readonly style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 14px; transition: all 0.2s ease; outline: none; opacity: 0.6;">
                        </div>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 32px;">
                        <button type="button" class="btn btn-outline" onclick="showPasswordModal()" style="padding: 10px 24px; border-radius: 12px; font-weight: 500;">Change Password</button>
                        <button type="submit" class="btn btn-primary" style="padding: 10px 24px; border-radius: 12px; font-weight: 500;">Save Changes</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- Password Modal -->
    <div id="passwordModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 1000; align-items: center; justify-content: center;">
        <div class="modal-content" style="background: var(--card); padding: 32px; border-radius: 12px; width: 90%; max-width: 400px; border: 1px solid var(--border); box-shadow: var(--shadow-l3);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2 style="margin: 0; font-size: 20px; font-weight: 600; letter-spacing: -0.5px;">Change Password</h2>
                <button class="icon-btn" onclick="closePasswordModal()" style="background: rgba(0,0,0,0.05); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;"><i class="ri-close-line"></i></button>
            </div>
            <form id="passwordForm">
                <div class="form-group" style="margin-bottom: 16px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; opacity: 0.7;">New Password</label>
                    <input type="password" id="newPassword" class="form-control" required style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 14px; transition: all 0.2s ease; outline: none;">
                </div>
                <div class="form-group" style="margin-bottom: 24px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; opacity: 0.7;">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" required style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 14px; transition: all 0.2s ease; outline: none;">
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 12px;">
                    <button type="button" class="btn btn-outline" onclick="closePasswordModal()" style="padding: 10px 20px; border-radius: 12px; font-weight: 500;">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="padding: 10px 20px; border-radius: 12px; font-weight: 500;">Update Password</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const session = Auth.checkAuth('admin');
            const admins = Auth.getAdmins();
            const user = admins.find(u => u.id === session.userId);

            if (user) {
                document.getElementById('profileName').innerText = user.name;
                document.getElementById('profileEmail').innerText = user.email;
                
                if (user.avatar) {
                    document.getElementById('profileAvatar').innerHTML = `<img src="${user.avatar}" style="width: 100%; height: 100%; object-fit: cover;">`;
                } else {
                    document.getElementById('profileAvatar').innerText = user.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
                }
                
                document.getElementById('name').value = user.name;
                document.getElementById('email').value = user.email;
                document.getElementById('collegeName').value = UI.getCollegeName();
                document.getElementById('adminId').value = user.adminId;
            }
        });

        document.getElementById('avatarUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const session = Auth.getSession();
                    const users = Auth.getUsers();
                    const index = users.findIndex(u => u.id === session.userId);
                    
                    if (index !== -1) {
                        users[index].avatar = event.target.result;
                        localStorage.setItem('campus_users', JSON.stringify(users));
                        
                        session.avatar = event.target.result;
                        localStorage.setItem('currentUser', JSON.stringify(session));
                        
                        document.getElementById('profileAvatar').innerHTML = `<img src="${event.target.result}" style="width: 100%; height: 100%; object-fit: cover;">`;
                        UI.updateUserInfo();
                        Notifications.showToast('Profile photo updated!', 'success');
                    }
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('profileForm').onsubmit = (e) => {
            e.preventDefault();
            const session = Auth.getSession();
            const users = Auth.getUsers();
            const index = users.findIndex(u => u.id === session.userId);

            if (index !== -1) {
                users[index].name = document.getElementById('name').value;
                users[index].email = document.getElementById('email').value;
                localStorage.setItem('campus_users', JSON.stringify(users));
                
                // Save college name
                localStorage.setItem('collegeName', document.getElementById('collegeName').value);
                
                // Update session
                session.name = users[index].name;
                session.email = users[index].email;
                localStorage.setItem('currentUser', JSON.stringify(session));
                
                Notifications.showToast('Profile updated successfully!', 'success');
                UI.updateBranding();
                setTimeout(() => location.reload(), 1000);
            }
        };

        function showPasswordModal() {
            document.getElementById('passwordModal').style.display = 'flex';
        }

        function closePasswordModal() {
            document.getElementById('passwordModal').style.display = 'none';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        }

        document.getElementById('passwordForm').onsubmit = (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                Notifications.showToast('Passwords do not match', 'danger');
                return;
            }

            const session = Auth.getSession();
            const users = Auth.getUsers();
            const index = users.findIndex(u => u.id === session.userId);

            if (index !== -1) {
                users[index].password = newPassword;
                localStorage.setItem('campus_users', JSON.stringify(users));
                Notifications.showToast('Password updated successfully!', 'success');
                closePasswordModal();
            }
        };
    </script>
</body>
</html>
