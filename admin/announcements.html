<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements - Campus Issue Reporting System</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/forms.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <i class="ri-government-line"></i>
                    <span>ABC Campus</span>
                </div>
                <button class="icon-btn" onclick="UI.toggleSidebar()" style="font-size: 18px;">
                    <i class="ri-menu-fold-line"></i>
                </button>
            </div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="./admin-dashboard.html" class="nav-link ">
                        <i class="ri-dashboard-line"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="./manage-issues.html" class="nav-link ">
                        <i class="ri-list-settings-line"></i>
                        <span>Manage Issues</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="./students.html" class="nav-link ">
                        <i class="ri-group-line"></i>
                        <span>User Management</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="./analytics.html" class="nav-link ">
                        <i class="ri-bar-chart-box-line"></i>
                        <span>Analytics</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="./reports.html" class="nav-link ">
                        <i class="ri-file-chart-line"></i>
                        <span>Reports</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="./announcements.html" class="nav-link active">
                        <i class="ri-megaphone-line"></i>
                        <span>Announcements</span>
                    </a>
                </li>
            </ul>
        </aside>

        <main class="main-content">
            <nav class="top-navbar">
                <div class="navbar-left">
                    <button class="mobile-menu-btn" onclick="UI.toggleSidebar()">
                        <i class="ri-menu-line"></i>
                    </button>
                    <div class="search-bar" style="position: relative;">
                        <i class="ri-search-line" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.5;"></i>
                        <input type="text" placeholder="Search..." style="padding-left: 36px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); height: 36px; width: 240px; outline: none;">
                    </div>
                </div>
                <div class="navbar-center" style="font-weight: 600; font-size: 15px; letter-spacing: 0.5px;">Campus Issue Reporting System</div>
                <div class="navbar-right">
                    <div class="notification-wrapper">
                        <button class="notification-btn" onclick="UI.toggleNotifications(event)" title="Notifications">
                            <i class="ri-notification-3-line"></i>
                            <span id="notif-badge" class="notification-badge" style="display: none;">0</span>
                        </button>
                        <div id="notif-dropdown" class="dropdown-menu" style="display: none;">
                            <div id="notif-list" class="dropdown-list">
                                <!-- Notifications -->
                            </div>
                        </div>
                    </div>
                    <button class="toggle-btn" onclick="Theme.toggle()" title="Toggle Theme">
                        <i class="ri-moon-line theme-icon"></i>
                    </button>
                    <div class="profile-dropdown" onclick="UI.toggleProfileMenu(event)">
                        <div class="avatar" id="adminAvatar">AD</div>
                        <div id="profileMenu" class="dropdown-menu" style="display: none;">
                            <a href="./profile.html" class="nav-link"><i class="ri-user-settings-line"></i> Profile Settings</a>
                            <a href="../student/support.html" class="nav-link"><i class="ri-customer-service-2-line"></i> Support</a>
                            <div class="dropdown-divider" style="height: 1px; background: var(--border); margin: 8px 0;"></div>
                            <a href="#" onclick="Auth.logout()" class="nav-link danger" style="color: var(--danger);"><i class="ri-logout-box-line"></i> Logout</a>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h1 style="margin: 0; font-size: 24px; font-weight: 600; letter-spacing: -0.5px;">Announcements</h1>
                <button class="btn btn-primary" onclick="showCreateModal()" style="padding: 10px 20px; border-radius: 12px; font-weight: 500; display: flex; align-items: center; gap: 8px;"><i class="ri-add-line"></i> New Announcement</button>
            </div>

            <div class="table-container" style="padding: 24px; border-radius: 12px; border: 1px solid var(--border); box-shadow: var(--shadow-l1); background: var(--card);">
                <table class="data-table" style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background: rgba(0,0,0,0.02);">
                            <th style="text-align: left; padding: 16px; font-weight: 500; font-size: 12px; opacity: 0.7; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.5px;">Message</th>
                            <th style="text-align: left; padding: 16px; font-weight: 500; font-size: 12px; opacity: 0.7; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.5px;">Type</th>
                            <th style="text-align: left; padding: 16px; font-weight: 500; font-size: 12px; opacity: 0.7; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.5px;">Date</th>
                            <th style="text-align: left; padding: 16px; font-weight: 500; font-size: 12px; opacity: 0.7; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.5px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="announcementsTable"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Create Announcement Modal -->
    <div id="createModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 1000; align-items: center; justify-content: center;">
        <div class="modal-content" style="background: var(--card); padding: 32px; border-radius: 12px; width: 90%; max-width: 500px; border: 1px solid var(--border); box-shadow: var(--shadow-l3);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2 style="margin: 0; font-size: 20px; font-weight: 600; letter-spacing: -0.5px;">New Announcement</h2>
                <button class="icon-btn" onclick="closeCreateModal()" style="background: rgba(0,0,0,0.05); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;"><i class="ri-close-line"></i></button>
            </div>
            <form id="createForm" onsubmit="handleCreate(event)">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; opacity: 0.7;">Message</label>
                    <textarea id="announceText" class="form-control" rows="4" required style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 14px; transition: all 0.2s ease; outline: none; resize: vertical;"></textarea>
                </div>
                <div class="form-group" style="margin-bottom: 24px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; opacity: 0.7;">Type</label>
                    <select id="announceType" class="form-control" style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 14px; transition: all 0.2s ease; outline: none; appearance: none; cursor: pointer;">
                        <option value="info">Information</option>
                        <option value="warning">Warning</option>
                        <option value="success">Success</option>
                        <option value="danger">Urgent</option>
                    </select>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 12px;">
                    <button type="button" class="btn btn-outline" onclick="closeCreateModal()" style="padding: 10px 20px; border-radius: 12px; font-weight: 500;">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="padding: 10px 20px; border-radius: 12px; font-weight: 500;">Post Announcement</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal Removed -->

    <script src="../js/auth.js"></script>
    <script src="../js/announcements.js"></script>
    <script src="../js/notifications.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Auth.checkAuth('admin');
            loadAnnouncements();
        });

        function loadAnnouncements() {
            const announcements = Announcements.getAll();
            const tbody = document.getElementById('announcementsTable');
            
            if (announcements.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4">${UI.getEmptyState("No announcements", "Create a new announcement to notify students")}</td></tr>`;
                return;
            }

            tbody.innerHTML = announcements.map(a => `
                <tr style="border-bottom: 1px solid var(--border); transition: background 0.2s ease;" onmouseover="this.style.background='rgba(0,0,0,0.02)'" onmouseout="this.style.background='transparent'">
                    <td style="padding: 16px; font-size: 14px;">${a.text}</td>
                    <td style="padding: 16px;">
                        <span class="badge badge-${a.type}" style="padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: capitalize;">${a.type}</span>
                    </td>
                    <td style="padding: 16px; font-size: 14px; opacity: 0.8;">${(() => {
                        const d = new Date(a.date);
                        return !isNaN(d.getTime()) ? d.toLocaleDateString() : 'N/A';
                    })()}</td>
                    <td style="padding: 16px;">
                        <div class="action-container" style="position: relative; display: inline-block;">
                            <button class="icon-btn" onclick="toggleDeletePopup(event, '${a.id}')" style="color: var(--danger); background: rgba(239, 68, 68, 0.1); border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease;" onmouseover="this.style.background='rgba(239, 68, 68, 0.2)'" onmouseout="this.style.background='rgba(239, 68, 68, 0.1)'">
                                <i class="ri-delete-bin-line"></i>
                            </button>
                            <div id="delete-popup-announce-${a.id}" class="delete-popup" style="display: none;">
                                <div class="delete-popup-arrow"></div>
                                <p style="margin: 0 0 16px 0; font-size: 14px; font-weight: 500; color: var(--text);">Delete this announcement?</p>
                                <div style="display: flex; gap: 8px;">
                                    <button class="btn btn-outline" style="flex: 1; padding: 6px; font-size: 12px;" onclick="closeDeletePopup('${a.id}')">Cancel</button>
                                    <button class="btn" style="flex: 1; padding: 6px; font-size: 12px; background: var(--danger); color: white; border: none;" onclick="confirmDeleteAnnouncement('${a.id}')">Delete</button>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function showCreateModal() {
            document.getElementById('createModal').style.display = 'flex';
        }

        function closeCreateModal() {
            document.getElementById('createModal').style.display = 'none';
            document.getElementById('createForm').reset();
        }

        function handleCreate(e) {
            e.preventDefault();
            const text = document.getElementById('announceText').value;
            const type = document.getElementById('announceType').value;
            
            Announcements.create({ text, type });
            Notifications.showToast('Announcement created successfully', 'success');
            closeCreateModal();
            loadAnnouncements();
        }

        function toggleDeletePopup(event, id) {
            event.stopPropagation();
            const popupId = `delete-popup-announce-${id}`;
            const popup = document.getElementById(popupId);
            
            // Close all other popups first
            document.querySelectorAll('.delete-popup').forEach(p => {
                if (p.id !== popupId) p.style.display = 'none';
            });

            if (popup) {
                const isVisible = popup.style.display === 'block';
                popup.style.display = isVisible ? 'none' : 'block';
            }
        }

        function closeDeletePopup(id) {
            const popup = document.getElementById(`delete-popup-announce-${id}`);
            if (popup) popup.style.display = 'none';
        }

        function confirmDeleteAnnouncement(id) {
            Announcements.delete(id);
            Notifications.showToast('Announcement deleted', 'success');
            loadAnnouncements();
        }
    </script>
</body>
</html>
