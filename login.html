<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Campus Issue Reporting System</title>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/forms.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container" style="background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh;">
        <div class="auth-card" style="background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 40px; border-radius: 16px; box-shadow: var(--shadow-l3); width: 100%; max-width: 400px;">
            <div class="auth-header" style="text-align: center; margin-bottom: 32px;">
                <h1 class="auth-title" style="color: var(--text); margin-bottom: 8px; font-size: 24px;">Campus Issue Reporting System</h1>
                <h2 style="color: var(--text); margin-bottom: 8px; font-size: 18px; font-weight: 500;">Welcome Back</h2>
                <p style="color: var(--text); opacity: 0.7;">Login to your campus account</p>
            </div>
            <form id="loginForm">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="color: var(--text); display: block; margin-bottom: 8px; font-weight: 500;">Email or Student ID</label>
                    <input type="text" id="emailOrId" required placeholder="Enter your email or ID" style="background: var(--bg); color: var(--text); border: 1px solid var(--border); width: 100%; padding: 12px 16px; border-radius: 8px; outline: none;">
                </div>
                <div class="form-group" style="margin-bottom: 24px;">
                    <label style="color: var(--text); display: block; margin-bottom: 8px; font-weight: 500;">Password</label>
                    <div style="position: relative; margin-bottom: 4px;">
                        <input type="password" id="password" required placeholder="••••••••" style="background: var(--bg); color: var(--text); border: 1px solid var(--border); width: 100%; padding: 12px 16px; border-radius: 8px; outline: none; padding-right: 60px;">
                        <button type="button" id="togglePassword" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--primary); cursor: pointer; font-size: 13px; font-weight: 600;">
                            Show
                        </button>
                    </div>
                    <div style="text-align: right;">
                        <a href="./forgot-password.html" style="color: var(--primary); font-size: 13px; font-weight: 500; text-decoration: none;">Forgot Password?</a>
                    </div>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; font-size: 14px;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text); opacity: 0.8;">
                        <input type="checkbox" id="remember"> Remember me
                    </label>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; border-radius: 8px; font-weight: 600;">Student Login</button>
            </form>
            <div class="auth-footer" style="text-align: center; margin-top: 32px;">
                <p style="color: var(--text); opacity: 0.7;">Don't have an account? <a href="./register.html" style="color: var(--primary); font-weight: 600;">Register here</a></p>
                <p style="margin-top: 12px;"><a href="./admin/admin-login.html" style="color: var(--text); opacity: 0.5; font-size: 14px;">Admin Portal</a></p>
            </div>
        </div>
    </div>

    <script src="./js/auth.js"></script>
    <script src="./js/notifications.js"></script>
    <script src="./js/theme.js"></script>
    <script src="./js/ui.js"></script>
    <script>
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                this.textContent = 'Hide';
            } else {
                passwordInput.type = 'password';
                this.textContent = 'Show';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const emailOrId = document.getElementById('emailOrId').value;
            const password = document.getElementById('password').value;

            try {
                const user = Auth.login(emailOrId, password, 'student');
                Notifications.showToast(`Welcome back, ${user.name}!`, 'success');
                setTimeout(() => {
                    window.location.href = './student/dashboard.html';
                }, 1000);
            } catch (error) {
                Notifications.showToast(error.message, 'danger');
            }
        });
    </script>
</body>
</html>
